name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract game
      run: unzip FishingGame.zip -d FishingGame
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install buildozer
      run: |
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk
        
    - name: Build APK
      run: |
        cd FishingGame
        buildozer init -f
        sed -i 's/^requirements = .*/requirements = python3,pygame/' buildozer.spec
        sed -i 's/^# android.api = .*/android.api = 30/' buildozer.spec
        sed -i 's/^# android.ndk = .*/android.ndk = 28c/' buildozer.spec
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: fishing-game-apk
        path: FishingGame/bin/*.apk
